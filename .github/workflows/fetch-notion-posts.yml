name: Fetch megaZN posts from Notion

on:
  workflow_dispatch:
    # Triggerable manually from Actions tab if needed
    # Primary publish flow: Notion automation → Vercel Deploy Hook (no schedule needed)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch posts from Notion
        run: npm run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Commit and push any generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add megazn/ index.html
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: sync megaZN posts from Notion [skip ci]" &&
            git push
          )
